# fly.toml app configuration file for app-holy-snowflake-3838

app = 'app-holy-snowflake-3838'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = '8080'
  BOT_PREFIX = '!'
  TYPHOON_BASE_URL = 'https://api.opentyphoon.ai/v1'
  TYPHOON_MODEL = 'typhoon-v2.5-30b-a3b-instruct'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.checks]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
